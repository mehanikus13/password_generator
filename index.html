<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.freepik.com/512/17706/17706679.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Генератор паролей</h1>

        <div class="password-display-container">
            <input type="text" id="password-display" readonly>
            <button id="copy-btn" title="Копировать пароль">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
                    <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/>
                </svg>
            </button>
        </div>

        <div class="options-container">
            <div class="option length-option">
                <label for="length">Длина пароля: <span id="length-value">12</span></label>
                <div class="length-controls">
                    <button id="decrement-length">-</button>
                    <input type="range" id="length" min="4" max="64" value="12">
                    <button id="increment-length">+</button>
                </div>
            </div>
            <div class="options-grid">
                <div class="option">
                    <label class="checkbox-label">Строчные (a-z)
                        <input type="checkbox" id="lowercase" checked>
                        <span class="checkmark"></span>
                    </label>
                </div>
                <div class="option">
                    <label class="checkbox-label">Заглавные (A-Z)
                        <input type="checkbox" id="uppercase" checked>
                        <span class="checkmark"></span>
                    </label>
                </div>
                <div class="option">
                    <label class="checkbox-label">Числа (0-9)
                        <input type="checkbox" id="numbers" checked>
                        <span class="checkmark"></span>
                    </label>
                </div>
                <div class="option">
                    <label class="checkbox-label">Символы (!@#$%^&*)
                        <input type="checkbox" id="symbols" checked>
                        <span class="checkmark"></span>
                    </label>
                </div>
                <div class="option">
                    <label class="checkbox-label">Исключать повторение
                        <input type="checkbox" id="exclude-repetition">
                        <span class="checkmark"></span>
                    </label>
                </div>
                <div class="option">
                    <label class="checkbox-label">Исключить похожие символы (1, l, I, 0, O)
                        <input type="checkbox" id="exclude-ambiguous">
                        <span class="checkmark"></span>
                    </label>
                </div>
            </div>
        </div>

        <button id="generate-btn">Сгенерировать пароль</button>

        <div class="multi-password-container">
            <button id="generate-multiple-btn">Сгенерировать несколько паролей</button>
            <div id="multi-password-display" class="passwords-grid"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
